name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check files
        run: |
          ls -la public/js/
      
      - name: Replace Firebase Config
        run: |
          if [ -f "public/js/firebase.js" ]; then
            CONFIG_ESCAPED=$(echo '${{ secrets.FIREBASE_CONFIG }}' | sed 's/[&/\]/\\&/g')
            sed -i "s|__FIREBASE_CONFIG__|${CONFIG_ESCAPED}|g" public/js/firebase.js
            echo "✅ Config replaced in firebase.js"
          else
            echo "❌ public/js/firebase.js not found!"
            exit 1
          fi
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - run: npm install -g firebase-tools
      
      - run: firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}