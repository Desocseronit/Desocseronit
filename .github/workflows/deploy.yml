name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Replace Firebase Config
        run: |
          if [ -z "${{ secrets.FIREBASE_CONFIG }}" ]; then
            echo "ERROR: FIREBASE_CONFIG secret is empty!"
            exit 1
          fi
          
          CONFIG_ESCAPED=$(echo '${{ secrets.FIREBASE_CONFIG }}' | sed 's/[&/\]/\\&/g')
          sed -i "s|__FIREBASE_CONFIG__|${CONFIG_ESCAPED}|g" public/js/main.js
          
          echo "Config replaced successfully"
      
      - name: Verify replacement
        run: |
          if grep -q "__FIREBASE_CONFIG__" public/js/main.js; then
            echo "ERROR: Placeholder still present!"
            exit 1
          else
            echo "OK: Placeholder replaced"
          fi
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - run: npm install -g firebase-tools
      
      - run: firebase deploy --only hosting --token ${{ secrets.FIREBASE_TOKEN }}