<!DOCTYPE html>
<html>
<head>
    <title>Create Counter</title>
</head>
<body>
    <h1>Создание счетчика</h1>
    <button id="create">Создать счетчик</button>
    <div id="status"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
        import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';
        
        // 🔥 ВСТАВЬ СВОЙ КОНФИГ
        const firebaseConfig = {
  apiKey: "AIzaSyBGkaoYATgPFQcIc2Zfd8hm7-KLNbtQsOI",
  authDomain: "clicker-for-github-home-repo.firebaseapp.com",
  projectId: "clicker-for-github-home-repo",
  storageBucket: "clicker-for-github-home-repo.firebasestorage.app",
  messagingSenderId: "281467324296",
  appId: "1:281467324296:web:3a40c2ab87b8e808f15c3d",
  measurementId: "G-8CH5L4RYYP"
};
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        document.getElementById('create').onclick = async () => {
            try {
                await setDoc(doc(db, "counters", "global"), { count: 0 });
                document.getElementById('status').innerHTML = "✅ Счетчик создан! <a href='https://clicker-for-github-home-repo.web.app' target='_blank'>Перейти на сайт</a>";
            } catch (error) {
                document.getElementById('status').innerHTML = "❌ Ошибка: " + error.message;
            }
        };
    </script>
</body>
</html>
